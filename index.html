// MAIN APP
// ═══════════════════════════════════════════
function ElimProductionApp() {
  const contentRef = useRef(null);
  const scrollPositions = useRef({});
  const [currentUser, setCurrentUser] = useState(() => _ls.get("elim_remember_user") || "");
  const [viewStack, setViewStack] = useState(["my-tasks"]);
  const view = viewStack[viewStack.length - 1];
  const [checklistFilter, setChecklistFilter] = useState(null);
  const [checks, setChecks, c1] = useStorage("elim3-checks", {});
  const [assignments, setAssignments, c2] = useStorage("elim3-assign", {});
  const [completions, setCompletions, c3] = useStorage("elim3-comp", {});
  const [taskNotes, setTaskNotes, c4] = useStorage("elim3-notes", {});
  const [photos, setPhotos, c5] = useStorage("elim3-photos", {});
  const [roster, setRoster, c6] = useStorage("elim3-roster", DEFAULT_ROSTER);
  const [timerState, setTimerState, c7] = useStorage("elim3-timer", { startedAt: null, accumulated: 0, targetMinutes: null });
  const [history, setHistory, c8] = useStorage("elim3-history", []);
  const [ioConfig, setIoConfig, c9] = useStorage("elim3-io-config", DEFAULT_IO_LINE_LIST);
  const [checklistData, setChecklistData] = useState(CHECKLIST_DATA);
  const [elapsed, setElapsed] = useState(0);
  const [syncError, setSyncError] = useState(false);

  useEffect(() => {
    const handler = (e) => {
      if (e.detail?.status === 'error') setSyncError(true);
      if (e.detail?.status === 'ok') setSyncError(false);
    };
    window.addEventListener('elim-sync-status', handler);
    return () => window.removeEventListener('elim-sync-status', handler);
  }, []);

  const [offline, setOffline] = useState(false);
  useEffect(() => {
    if (!_fb) return;
    const connRef = firebase.database().ref('.info/connected');
    const handler = (snap) => setOffline(snap.val() === false);
    connRef.on('value', handler);
    return () => connRef.off('value', handler);
  }, []);

  // Derive running from timer state
  const running = !!timerState.startedAt;
  const targetSeconds = timerState.targetMinutes ? timerState.targetMinutes * 60 : null;
  const remaining = targetSeconds !== null ? Math.max(0, targetSeconds - elapsed) : null;

  // Compute elapsed from persisted timer
  useEffect(() => {
    const compute = () => {
      if (timerState.startedAt) {
        const e = timerState.accumulated + Math.floor((Date.now() - timerState.startedAt) / 1000);
        setElapsed(e);
        // Auto-pause when countdown reaches zero
        if (timerState.targetMinutes && e >= timerState.targetMinutes * 60) {
          setTimerState({ ...timerState, startedAt: null, accumulated: e });
        }
      } else {
        setElapsed(timerState.accumulated || 0);
      }
    };
    compute();
    if (!timerState.startedAt) return;
    const iv = setInterval(compute, 1000);
    return () => clearInterval(iv);
  }, [timerState]);

  const autoStoppedRef = useRef(false);

  const setRunning = useCallback((shouldRun) => {
    if (shouldRun && !timerState.startedAt) {
      autoStoppedRef.current = false;
      setTimerState({ ...timerState, startedAt: Date.now() });
    } else if (!shouldRun && timerState.startedAt) {
      // Pause — freeze accumulated
      const now = Date.now();
      const total = timerState.accumulated + Math.floor((now - timerState.startedAt) / 1000);
      setTimerState({ ...timerState, startedAt: null, accumulated: total });
    }
  }, [timerState, setTimerState]);

  const setTarget = useCallback((minutes) => {
    setTimerState({ startedAt: null, accumulated: 0, targetMinutes: minutes });
  }, [setTimerState]);

  const deleteHistory = useCallback((index) => {
    setHistory(history.filter((_, i) => i !== index));
  }, [history, setHistory]);

  const newWeek = useCallback(() => {
    autoStoppedRef.current = false;
    const totalItems = checklistData.filter(sec => sec.id !== "post-event").reduce((s, sec) => s + sec.items.length, 0);
    const liveItems = checklistData.filter(s => s.id !== "post-event").flatMap(s => s.items);
    const totalChecked = liveItems.filter(i => checks[i.id]).length;
    const finalElapsed = timerState.startedAt
      ? timerState.accumulated + Math.floor((Date.now() - timerState.startedAt) / 1000)
      : timerState.accumulated || 0;

    if (totalChecked === 0 && finalElapsed === 0) {
      setChecks({});
      setCompletions({});
      setTimerState({ startedAt: null, accumulated: 0, targetMinutes: null });
      return;
    }

    const pct = totalItems > 0 ? Math.round((totalChecked / totalItems) * 100) : 0;
    const record = { date: new Date().toISOString().slice(0, 10), pct, elapsed: finalElapsed, tasks: totalChecked, total: totalItems };
    // Write reset flag before clearing — if interrupted, next load will complete the reset
    window.storage.set("elim3-pending-reset", JSON.stringify(true)).then(() => {
      setHistory([record, ...history].slice(0, 52));
      setChecks({});
      setCompletions({});
      setTimerState({ startedAt: null, accumulated: 0, targetMinutes: null });
      // Remove flag once all clears are dispatched
      window.storage.delete("elim3-pending-reset").catch(() => {});
    }).catch(() => {
      // Firebase unavailable — still clear locally; flag persists in localStorage to retry on next load
      setHistory([record, ...history].slice(0, 52));
      setChecks({});
      setCompletions({});
      setTimerState({ startedAt: null, accumulated: 0, targetMinutes: null });
    });
  }, [checklistData, checks, timerState, history, setChecks, setCompletions, setTimerState, setHistory]);

  // On load: if a reset was interrupted mid-flight, complete it now
  useEffect(() => {
    if (!loaded) return;
    window.storage.get("elim3-pending-reset").then(r => {
      if (r?.value) {
        try {
          const flag = JSON.parse(r.value);
          if (flag) {
            setChecks({});
            setCompletions({});
            setTimerState({ startedAt: null, accumulated: 0, targetMinutes: null });
            window.storage.delete("elim3-pending-reset").catch(() => {});
          }
        } catch(e) {}
      }
    }).catch(() => {});
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [loaded]);

  useEffect(() => {
    window.storage.delete("elim3-checklist-data").catch(() => {});
    _ls.del("elim_elim3-checklist-data");
    _ls.del("elim_checklist_version");
  }, []);

  // Derive team lists from roster
  const teamMembers = roster.map(r => r.name);

  // Remember-me: save choice to this device
  const selectUser = useCallback((name) => {
    setCurrentUser(name);
    if (name) {
      _ls.set("elim_remember_user", name);
      setViewStack(["my-tasks"]);
    } else {
      _ls.del("elim_remember_user");
    }
  }, []);

  // If remembered user was removed from roster, clear
  useEffect(() => {
    if (currentUser && teamMembers.length > 0 && !teamMembers.includes(currentUser)) {
      selectUser("");
    }
  }, [teamMembers, currentUser]);

  const navigate = useCallback((target) => {
    scrollPositions.current[view] = window.scrollY;
    let actualView = target;
    let newFilter = null;
    if (target.startsWith("checklist:")) {
      newFilter = target.split(":")[1];
      actualView = "crew-tasks";
    }
    setChecklistFilter(newFilter);
    setViewStack(prev => {
      const idx = prev.indexOf(actualView);
      if (idx >= 0) return prev.slice(0, idx + 1);
      return [...prev, actualView];
    });
  }, [view]);

  const goBack = useCallback(() => {
    scrollPositions.current[view] = window.scrollY;
    setChecklistFilter(null);
    setViewStack(prev => prev.length > 1 ? prev.slice(0, -1) : prev);
  }, [view]);

  useEffect(() => {
    const saved = scrollPositions.current[view] || 0;
    if (saved === 0) {
      window.scrollTo(0, 0);
      return;
    }
    let attempts = 0;
    const tryRestore = () => {
      window.scrollTo(0, saved);
      attempts++;
      if (Math.abs(window.scrollY - saved) > 5 && attempts < 10) {
        requestAnimationFrame(tryRestore);
      }
    };
    requestAnimationFrame(tryRestore);
  }, [view]);

  useBackSwipe(viewStack.length > 1 && view !== "dashboard" ? goBack : null, contentRef);

  const totalItems = checklistData.filter(sec => sec.id !== "post-event").reduce((s, sec) => s + sec.items.length, 0);
  const allItems = useMemo(
    () => checklistData.filter(s => s.id !== "post-event").flatMap(s => s.items.map(i => ({ ...i, section: s }))),
    [checklistData]
  );
  useEffect(() => {
    if (!running || autoStoppedRef.current) return;
    const totalChecked = allItems.filter(i => checks[i.id]).length;
    if (totalChecked >= totalItems && totalItems > 0) {
      autoStoppedRef.current = true;
      setRunning(false);
    }
  }, [checks, allItems, totalItems, running, setRunning]);

  const setupComplete = useCallback(() => {
    const totalChecked = allItems.filter(i => checks[i.id]).length;
    const pct = totalItems > 0 ? Math.round((totalChecked / totalItems) * 100) : 0;
    const finalElapsed = timerState.startedAt
      ? timerState.accumulated + Math.floor((Date.now() - timerState.startedAt) / 1000)
      : timerState.accumulated || 0;
    const record = { date: new Date().toISOString().slice(0, 10), pct, elapsed: finalElapsed, tasks: totalChecked, total: totalItems };
    setHistory([record, ...history].slice(0, 52));
    setTimerState({ startedAt: null, accumulated: finalElapsed, targetMinutes: timerState.targetMinutes });
    autoStoppedRef.current = true;
  }, [allItems, checks, totalItems, timerState, history, setHistory, setTimerState]);

  const loaded = c1 && c2 && c3 && c4 && c6 && c7 && c8 && c9;

  const titles = {
    dashboard: "ELIM Production", checklist: "Setup Checklist", "my-tasks": "My Tasks",
    "crew-tasks": checklistFilter === "__unassigned__" ? "Unassigned Tasks" : checklistFilter ? `${checklistFilter}'s Tasks` : "Crew Tasks",
    "power-seq": "Power Sequence", "io-list": "I/O Line List", network: "Signal Flow", "db-meter": "dB Meter",
    settings: "Settings",
  };

  if (!loaded) return (
    <div style={{ minHeight: "100vh", background: S.bg, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: S.sans }}>
      <div style={{ textAlign: "center", color: S.text }}><div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}><ElimLogo size={56} /></div><div style={{ fontSize: 15, opacity: 0.6 }}>Loading...</div></div>
    </div>
  );

  if (!currentUser) return (
    <div style={{ height: "100dvh", maxHeight: "100dvh", overflow: "hidden", background: S.bg, fontFamily: S.sans, color: S.text, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
      <div style={{ textAlign: "center", maxWidth: 380, width: "100%" }}>
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 14 }}><ElimLogo size={76} /></div>
        <h1 style={{ fontSize: 28, fontWeight: 800, margin: "0 0 4px", background: S.gradient, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>ELIM Production</h1>
        <p style={{ color: S.textMuted, fontSize: 14, marginBottom: 28 }}>Select your name to get started</p>
        <div style={{ display: "grid", gridTemplateColumns: teamMembers.length > 6 ? "1fr 1fr" : "1fr", gap: 6 }}>
          {teamMembers.map(name => (
            <button key={name} onClick={() => selectUser(name)} style={{
              padding: "13px 14px", background: S.card, border: `1px solid ${S.cardBorder}`,
              borderRadius: 10, color: S.text, fontSize: 15, fontWeight: 600, cursor: "pointer",
              textAlign: "center", transition: "all 0.15s ease", fontFamily: S.sans
            }}
            onMouseEnter={e => { e.target.style.background = S.accentGlow; e.target.style.borderColor = S.accentBorder; }}
            onMouseLeave={e => { e.target.style.background = S.card; e.target.style.borderColor = S.cardBorder; }}>{name}</button>
          ))}
        </div>
      </div>
    </div>
  );

  const sharedProps = { currentUser, checks, setChecks, assignments, setAssignments, completions, setCompletions, taskNotes, setTaskNotes, photos, setPhotos, teamMembers };
  const checklistProps = { checklistData, setChecklistData };

  return (
    <div style={{ minHeight: "100vh", background: S.bg, fontFamily: S.sans, color: S.text }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
      <Header currentUser={currentUser} title={titles[view] || "ELIM Production"}
        subtitle={null}
        onBack={view === "dashboard" ? null : (viewStack.length > 1 ? goBack : (view === "my-tasks" ? () => navigate("dashboard") : null))}
        onSwitchUser={view === "dashboard" ? () => selectUser("") : null}
        onSettings={view === "dashboard" ? () => navigate("settings") : null}
        syncError={syncError}
        rightContent={(view === "checklist" || view === "my-tasks" || view === "crew-tasks") ? (
          <div onClick={() => setRunning(!running)} style={{
            fontFamily: S.mono, fontSize: 14, fontWeight: 700, padding: "5px 10px", borderRadius: 8, cursor: "pointer",
            color: targetSeconds ? timerColor(remaining, targetSeconds) : running ? "#E88A8A" : S.textMuted,
            background: running ? "rgba(255,255,255,0.04)" : S.card,
            border: `1px solid ${targetSeconds && remaining !== null && remaining < targetSeconds * 0.25 ? "rgba(232,93,93,0.3)" : running ? "rgba(255,255,255,0.08)" : S.cardBorder}`
          }}>{targetSeconds ? formatTime(remaining) : `${running ? "⏱" : "▶"} ${formatTime(elapsed)}`}</div>
        ) : null}
      />
      <div style={{ height: "calc(48px + env(safe-area-inset-top, 0px))" }} />
      {offline && (
        <div style={{ position: "fixed", top: "calc(48px + env(safe-area-inset-top, 0px))", left: 0, right: 0, zIndex: 45, background: "rgba(245,158,11,0.15)", borderBottom: "1px solid rgba(245,158,11,0.3)", padding: "6px 16px", textAlign: "center", fontSize: 13, color: "#FBBF24", fontWeight: 600, fontFamily: S.sans, backdropFilter: "blur(8px)" }}>
          Offline — changes saved locally
        </div>
      )}
      <div ref={contentRef} style={{ maxWidth: 600, margin: "0 auto" }}>
        {view === "dashboard" && <DashboardView onNavigate={navigate} checks={checks} totalItems={totalItems} assignments={assignments} currentUser={currentUser} elapsed={elapsed} running={running} setRunning={setRunning} teamMembers={teamMembers} history={history} remaining={remaining} targetSeconds={targetSeconds} onSetTarget={setTarget} allItems={allItems} />}
        {view === "checklist" && <ChecklistView {...sharedProps} {...checklistProps} elapsed={elapsed} running={running} setRunning={setRunning} initialFilter={checklistFilter} noAutoExpand={true} />}
        {view === "my-tasks" && <MyTasksView {...sharedProps} elapsed={elapsed} running={running} setRunning={setRunning} remaining={remaining} targetSeconds={targetSeconds} checklistData={checklistData} onNavigate={navigate} />}
        {view === "crew-tasks" && <MyTasksView {...sharedProps} elapsed={elapsed} running={running} setRunning={setRunning} remaining={remaining} targetSeconds={targetSeconds} targetUser={checklistFilter} checklistData={checklistData} onNavigate={navigate} />}
        {view === "power-seq" && <PowerSeqView />}
        {view === "io-list" && <IOListView ioConfig={ioConfig} setIoConfig={setIoConfig} currentUser={currentUser} />}
        {view === "settings" && <SettingsView roster={roster} setRoster={setRoster} currentUser={currentUser} setCurrentUser={selectUser} history={history} onNewWeek={newWeek} assignments={assignments} setAssignments={setAssignments} onSetupComplete={setupComplete} onDeleteHistory={deleteHistory} />}
        {view === "network" && <SignalFlowView />}
        {view === "db-meter" && <DecibelMeterView />}
      </div>
    </div>
  );
}

    /* INLINE_APP_END */

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ErrorBoundary, null, React.createElement(ElimProductionApp)));
  </script>
</body>
</html>
