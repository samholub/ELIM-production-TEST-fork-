  <!-- Storage: Firebase Realtime Database with localStorage cache + real-time sync -->
  <script>
    // ╔═══════════════════════════════════════════════════════╗
    // ║  FIREBASE CONFIG — Replace with your project config  ║
    // ╚═══════════════════════════════════════════════════════╝
    let _fb = null; // Firebase ref, null if unavailable
    try {
      const firebaseConfig = {
        apiKey: "AIzaSyAq8TGyBunq_8g1z_3lF-zO73taalYfGyg",
        authDomain: "elim-production.firebaseapp.com",
        databaseURL: "https://elim-production-default-rtdb.firebaseio.com",
        projectId: "elim-production",
        storageBucket: "elim-production.firebasestorage.app",
        messagingSenderId: "222489117430",
        appId: "1:222489117430:web:8364febc826417f0dda2d7"
      };
      const app = firebase.initializeApp(firebaseConfig);
      _fb = firebase.database().ref('elim');
    } catch(e) {
      console.warn('Firebase unavailable, using localStorage only:', e.message);
    }

    // Safe localStorage wrapper (some environments like Claude preview block localStorage)
    const _ls = {
      get(k) { try { return localStorage.getItem(k); } catch(e) { return null; } },
      set(k,v) { try { localStorage.setItem(k,v); } catch(e) {} },
      del(k) { try { localStorage.removeItem(k); } catch(e) {} },
      keys() { try { const r=[]; for(let i=0;i<localStorage.length;i++) r.push(localStorage.key(i)); return r; } catch(e) { return []; } }
    };

    // Tracks keys where a local write is newer than what Firebase last confirmed.
    // While a key is in this set, incoming elim-sync events for it are ignored so
    // a Firebase listener firing stale data cannot silently overwrite local changes.
    const _pendingWrites = new Set();

    // Real-time listeners — notify React when data changes remotely
    const _listeners = {};
    function _startListener(key) {
      if (!_fb || _listeners[key]) return;
      _listeners[key] = true;
      _fb.child(key.replace(/\./g, '_')).on('value', (snap) => {
        const val = snap.val();
        if (val !== null && val !== undefined) {
          // Only propagate to React if we don't have a pending local write for this key
          if (!_pendingWrites.has(key)) {
            var normalized = (typeof val === 'object' && val !== null) ? JSON.stringify(val) : val;
            _ls.set('elim_' + key, normalized);
            window.dispatchEvent(new CustomEvent('elim-sync', { detail: { key, value: normalized } }));
          }
        }
      });
    }

    window.storage = {
      async get(key, shared) {
        const fbKey = key.replace(/\./g, '_');
        _startListener(key);
        try {
          if (_fb) {
            const snap = await _fb.child(fbKey).get();
            if (snap.exists()) {
              const val = snap.val();
              const normalized = (typeof val === 'object' && val !== null) ? JSON.stringify(val) : val;
              _ls.set('elim_' + key, normalized);
              return { key, value: normalized, shared: !!shared };
            }
          }
          const cached = _ls.get('elim_' + key);
          if (cached !== null) {
            // Do not push localStorage back to Firebase — avoids clobbering newer data
            return { key, value: cached, shared: !!shared };
          }
          throw new Error('not found');
        } catch (e) {
          const cached = _ls.get('elim_' + key);
          if (cached !== null) return { key, value: cached, shared: !!shared };
          throw e;
        }
      },
      async set(key, value, shared) {
        const fbKey = key.replace(/\./g, '_');
        _ls.set('elim_' + key, value);
        _startListener(key);
        if (_fb) {
          _pendingWrites.add(key);
          const attemptWrite = (attemptsLeft, delay) => {
            _fb.child(fbKey).set(value).then(() => {
              _pendingWrites.delete(key);
              window.dispatchEvent(new CustomEvent('elim-sync-status', { detail: { status: 'ok' } }));
            }).catch((e) => {
              console.warn('Firebase write failed:', e.message, '— retries left:', attemptsLeft);
              if (attemptsLeft > 0) {
                setTimeout(() => attemptWrite(attemptsLeft - 1, Math.min(delay * 2, 30000)), delay);
              } else {
                _pendingWrites.delete(key);
                window.dispatchEvent(new CustomEvent('elim-sync-status', { detail: { status: 'error', key } }));
              }
            });
          };
          attemptWrite(4, 2000);
        }
        return { key, value, shared: !!shared };
      },
      async merge(key, fields, shared) {
        const fbKey = key.replace(/\./g, '_');
        const current = _ls.get('elim_' + key);
        let fullObj = {};
        try {
          const parsed = current ? JSON.parse(current) : {};
          if (typeof parsed === 'object' && !Array.isArray(parsed)) fullObj = { ...parsed };
        } catch(e) {}
        for (const k of Object.keys(fields)) {
          if (fields[k] === null || fields[k] === undefined) delete fullObj[k];
          else fullObj[k] = fields[k];
        }
        _ls.set('elim_' + key, JSON.stringify(fullObj));
        _startListener(key);
        if (_fb) {
          _pendingWrites.add(key);
          const attemptMerge = (attemptsLeft, delay) => {
            _fb.child(fbKey).get().then(snap => {
              const currentVal = snap.exists() ? snap.val() : null;
              return (typeof currentVal === 'string' || currentVal === null)
                ? _fb.child(fbKey).set(fullObj)
                : _fb.child(fbKey).update(fields);
            }).then(() => {
              _pendingWrites.delete(key);
              window.dispatchEvent(new CustomEvent('elim-sync-status', { detail: { status: 'ok' } }));
            }).catch((e) => {
              console.warn('Firebase merge failed:', e.message, '— retries left:', attemptsLeft);
              if (attemptsLeft > 0) {
                setTimeout(() => attemptMerge(attemptsLeft - 1, Math.min(delay * 2, 30000)), delay);
              } else {
                _pendingWrites.delete(key);
                window.dispatchEvent(new CustomEvent('elim-sync-status', { detail: { status: 'error', key } }));
              }
            });
          };
          attemptMerge(4, 2000);
        }
        return { key, value: JSON.stringify(fullObj), shared: !!shared };
      },
      async delete(key, shared) {
        const fbKey = key.replace(/\./g, '_');
        _ls.del('elim_' + key);
        if (_fb) { try { await _fb.child(fbKey).remove(); } catch(e) {} }
        return { key, deleted: true, shared: !!shared };
      },
      async list(prefix, shared) {
        const keys = [];
        try {
          if (_fb) {
            const snap = await _fb.get();
            if (snap.exists()) {
              Object.keys(snap.val()).forEach(k => {
                const restored = k.replace(/_/g, '.');
                if (!prefix || restored.startsWith(prefix)) keys.push(restored);
              });
              return { keys, prefix, shared: !!shared };
            }
          }
        } catch(e) {}
        // Fallback: scan localStorage
        const pre = 'elim_' + (prefix || '');
        _ls.keys().forEach(k => { if (k.startsWith(pre)) keys.push(k.replace('elim_', '')); });
        return { keys, prefix, shared: !!shared };
      }
    };
  </script>

function useStorage(key, initial, shared = true) {
  const [val, setVal] = useState(initial);
  const [loaded, setLoaded] = useState(false);
  const prevRef = useRef(initial);
  useEffect(() => {
    window.storage.get(key, shared).then(r => {
      if (r?.value) {
        try {
          const parsed = JSON.parse(r.value);
          if (parsed != null) { setVal(parsed); prevRef.current = parsed; }
        } catch(err) {}
      }
    }).catch(() => {}).finally(() => setLoaded(true));
    // Real-time sync: update state when Firebase pushes changes from other devices
    const handler = (e) => {
      if (e.detail?.key === key && e.detail?.value) {
        try {
          const parsed = JSON.parse(e.detail.value);
          if (parsed != null) { setVal(parsed); prevRef.current = parsed; }
        } catch(err) {}
      }
    };
    window.addEventListener('elim-sync', handler);
    return () => window.removeEventListener('elim-sync', handler);
  }, []);
  const save = useCallback((v) => {
    const prev = prevRef.current;
    prevRef.current = v;
    setVal(v);
    if (typeof v === 'object' && v !== null && !Array.isArray(v) &&
        typeof prev === 'object' && prev !== null && !Array.isArray(prev)) {
      const fields = {};
      let changeCount = 0;
      for (const k of Object.keys(v)) {
        if (v[k] !== prev[k]) { fields[k] = v[k]; changeCount++; }
      }
      for (const k of Object.keys(prev)) {
        if (!(k in v)) { fields[k] = null; changeCount++; }
      }
      const totalKeys = Math.max(Object.keys(v).length, Object.keys(prev).length);
      if (changeCount > 0 && changeCount < totalKeys) {
        window.storage.merge(key, fields, shared).catch(() => {});
        return;
      }
    }
    window.storage.set(key, JSON.stringify(v), shared).catch(() => {});
  }, [key, shared]);
  return [val, save, loaded];
}

function formatTime(sec) {
  if (sec < 0) sec = 0;
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  return h > 0 ? `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}` : `${m}:${String(s).padStart(2,"0")}`;
}

function timerColor(remaining, total) {
  if (!total || total <= 0) return S.textMuted;
  const pct = remaining / total;
  if (pct > 0.5) return "#5CB87A"; // green
  if (pct > 0.25) return "#F59E0B"; // yellow
  if (pct > 0) return "#E85D5D"; // red
  return "#E85D5D";
}

function useBackSwipe(onBack, contentRef) {
  useEffect(() => {
    if (!onBack || !contentRef) return;
    let startX = 0, startY = 0, tracking = false;
    
    const onStart = (e) => {
      const touch = e.touches[0];
      // Skip if touch started inside a no-swipe zone (e.g. photo scroll)
      if (e.target.closest && e.target.closest('[data-no-swipe]')) return;
      // Skip if touch started in the header/back-button zone (top 80px, left 120px)
      if (touch.clientY < 80 && touch.clientX < 120) return;
      startX = touch.clientX;
      startY = touch.clientY;
      tracking = true;
    };
    
    const onMove = (e) => {
      if (!tracking || !contentRef.current) return;
      const touch = e.touches[0];
      const dx = touch.clientX - startX;
      const dy = touch.clientY - startY;
      
      // Only follow finger if moving right and horizontal movement dominates
      if (dx > 0 && dx > Math.abs(dy)) {
        e.preventDefault();
        contentRef.current.style.transition = 'none';
        contentRef.current.style.transform = `translateX(${dx}px)`;
        contentRef.current.style.opacity = 1 - (dx / window.innerWidth) * 0.3;
      }
    };
    
    const onEnd = (e) => {
      if (!tracking || !contentRef.current) return;
      tracking = false;
      const touch = e.changedTouches[0];
      const dx = touch.clientX - startX;
      
      if (dx > 80) { // 80px minimum
        if (dx > window.innerWidth * 0.35) {
          // Dragged past threshold - animate out and navigate
          contentRef.current.style.transition = 'transform 200ms ease-out, opacity 200ms ease-out';
          contentRef.current.style.transform = 'translateX(100%)';
          contentRef.current.style.opacity = '0.7';
          setTimeout(() => {
            if (contentRef.current) {
              contentRef.current.style.transition = '';
              contentRef.current.style.transform = '';
              contentRef.current.style.opacity = '';
            }
            onBack();
          }, 200);
        } else {
          // Below threshold - spring back
          contentRef.current.style.transition = 'transform 250ms ease-out, opacity 250ms ease-out';
          contentRef.current.style.transform = 'translateX(0)';
          contentRef.current.style.opacity = '1';
          setTimeout(() => {
            if (contentRef.current) {
              contentRef.current.style.transition = '';
            }
          }, 250);
        }
      } else {
        // No significant movement - reset immediately
        contentRef.current.style.transition = '';
        contentRef.current.style.transform = '';
        contentRef.current.style.opacity = '';
      }
    };
    
    document.addEventListener("touchstart", onStart, { passive: true });
    document.addEventListener("touchmove", onMove, { passive: false });
    document.addEventListener("touchend", onEnd, { passive: true });
    return () => {
      document.removeEventListener("touchstart", onStart);
      document.removeEventListener("touchmove", onMove);
      document.removeEventListener("touchend", onEnd);
    };
  }, [onBack, contentRef]);
}

function PhotoSlot({ slot, photos, setPhotos }) {
  const fileRef = useRef(null);
  const imageData = photos[slot.slot];

  const handleUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    // Resize for storage efficiency
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const maxW = 800, maxH = 600;
        let w = img.width, h = img.height;
        if (w > maxW) { h = h * (maxW / w); w = maxW; }
        if (h > maxH) { w = w * (maxH / h); h = maxH; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const data = canvas.toDataURL("image/jpeg", 0.7);
        setPhotos(prev => ({ ...prev, [slot.slot]: data }));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const handleRemove = (e) => {
    e.stopPropagation();
    if (confirm("Remove this photo?")) {
      setPhotos(prev => { const n = { ...prev }; delete n[slot.slot]; return n; });
    }
  };

  if (imageData) {
    return (
      <div style={{ position: "relative", minWidth: 120, height: 80, borderRadius: 8, overflow: "hidden", flexShrink: 0 }}>
        <img src={imageData} alt={slot.label} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
        <button onClick={handleRemove} style={{
          position: "absolute", top: 4, right: 4, width: 20, height: 20, borderRadius: 10,
          background: "rgba(0,0,0,0.7)", border: "none", color: "#fff", fontSize: 12,
          cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center"
        }}>×</button>
        <div style={{
          position: "absolute", bottom: 0, left: 0, right: 0, padding: "2px 6px",
          background: "rgba(0,0,0,0.6)", fontSize: 9, color: "#ccc", textAlign: "center"
        }}>{slot.label}</div>
      </div>
    );
  }

  return (
    <>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleUpload} style={{ display: "none" }} />
      <div onClick={() => fileRef.current?.click()} style={{
        minWidth: 110, height: 80, borderRadius: 8, flexShrink: 0,
        background: "rgba(255,235,210,0.03)", border: "1px dashed rgba(255,220,180,0.12)",
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        gap: 4, cursor: "pointer"
      }}>
        <span style={{ fontSize: 20, opacity: 0.35 }}>📷</span>
        <span style={{ fontSize: 9, color: S.textMuted, textAlign: "center", padding: "0 6px", lineHeight: 1.2 }}>{slot.label}</span>
      </div>
    </>
  );
}

function PhotoSlots({ photoSlots, photos, setPhotos }) {
  if (!photoSlots || photoSlots.length === 0) return null;
  return (

function AssignDropdown({ assignee, onAssign, isMine, teamMembers }) {
  const [open, setOpen] = useState(false);
  const wrapperRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handler);
    document.addEventListener("touchstart", handler);
    return () => {
      document.removeEventListener("mousedown", handler);
      document.removeEventListener("touchstart", handler);
    };
  }, [open]);

  return (
    <div ref={wrapperRef} style={{ position: "relative", display: "inline-block" }}>
      <div onClick={() => setOpen(!open)} style={{
        display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 6, cursor: "pointer",
        background: "rgba(255,220,180,0.04)", border: `1px solid ${S.cardBorder}`,
        fontSize: 15, fontFamily: S.sans,
        color: assignee ? (isMine ? S.accentText : S.textDim) : S.textMuted,
        fontWeight: isMine ? 600 : 400, fontStyle: assignee ? "normal" : "italic"
      }}>
        <span>{assignee || "Assign..."}</span>
        <span style={{ color: S.textMuted, fontSize: 11, marginLeft: 2 }}>▾</span>
      </div>
      {open && (
        <div style={{
          position: "absolute", left: 0, top: "100%", marginTop: 4, zIndex: 1000,
          background: "#1C1A18", border: `1px solid ${S.cardBorder}`, borderRadius: 8,
          maxHeight: 200, overflowY: "auto", minWidth: 160, boxShadow: "0 8px 24px rgba(0,0,0,0.5)"
        }}>
          {assignee && (
            <div onClick={() => { onAssign(""); setOpen(false); }} style={{
              padding: "10px 14px", fontSize: 15, color: S.textMuted, fontStyle: "italic",
              cursor: "pointer", fontFamily: S.sans
            }}
            onMouseEnter={e => e.currentTarget.style.background = S.accentGlow}
            onMouseLeave={e => e.currentTarget.style.background = "transparent"}>Unassign</div>
          )}
          {(teamMembers || []).map(m => (
            <div key={m} onClick={() => { onAssign(m); setOpen(false); }} style={{
              padding: "10px 14px", fontSize: 15, cursor: "pointer", fontFamily: S.sans,
              color: m === assignee ? S.accent : S.text, fontWeight: m === assignee ? 600 : 400
            }}
            onMouseEnter={e => e.currentTarget.style.background = S.accentGlow}
            onMouseLeave={e => e.currentTarget.style.background = "transparent"}>{m === assignee ? `✓ ${m}` : m}</div>
          ))}
        </div>
      )}
    </div>
  );
}

function SettingsView({ roster, setRoster, currentUser, setCurrentUser, history, onNewWeek, assignments, setAssignments, onSetupComplete, onDeleteHistory }) {
  const [newName, setNewName] = useState("");
  const [confirmingReset, setConfirmingReset] = useState(false);
  const [confirmingComplete, setConfirmingComplete] = useState(false);

  const teamMembers = roster.map(r => r.name);

  const getNextColor = () => {
    const used = new Set(roster.map(r => r.color));
    return COLOR_PALETTE.find(c => !used.has(c)) || COLOR_PALETTE[roster.length % COLOR_PALETTE.length];
  };

  const addMember = () => {
    const name = newName.trim();
    if (!name || teamMembers.includes(name)) return;
    setRoster([...roster, { name, color: getNextColor() }]);
    setNewName("");
  };

  const removeMember = (name) => {
    const assignCount = assignments ? Object.values(assignments).filter(v => v === name).length : 0;
    if (!confirm(assignCount > 0
      ? `Remove ${name} from the roster? Their ${assignCount} task assignment${assignCount === 1 ? "" : "s"} will be cleared.`
      : `Remove ${name} from the roster?`)) return;
    setRoster(roster.filter(r => r.name !== name));
    // Clear all task assignments belonging to the removed member
    if (assignments && setAssignments) {
      const updated = { ...assignments };
      let changed = false;
      Object.keys(updated).forEach(taskId => {
        if (updated[taskId] === name) { delete updated[taskId]; changed = true; }
      });
      if (changed) setAssignments(updated);
    }
    if (currentUser === name) {
      _ls.del("elim_remember_user");
      setCurrentUser("");
    }
  };

  return (
    <div style={{ padding: "12px 16px 80px" }}>

function DecibelMeterView() {
  const [db, setDb] = useState(-60);
  const [peak, setPeak] = useState(-60);
  const [error, setError] = useState(null);
  const streamRef = useRef(null);
  const ctxRef = useRef(null);
  const rafRef = useRef(null);
  const smoothRef = useRef(-60);
  const peakRef = useRef(-60);
  const peakTimeRef = useRef(0);

  const start = useCallback(async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      streamRef.current = stream;
      const ctx = new AudioContext();
      ctxRef.current = ctx;
      const source = ctx.createMediaStreamSource(stream);
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      source.connect(analyser);
      const buf = new Float32Array(analyser.fftSize);

      const loop = () => {
        analyser.getFloatTimeDomainData(buf);
        let sum = 0;
        for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
        const rms = Math.sqrt(sum / buf.length);
        const raw = rms > 0 ? 20 * Math.log10(rms) : -60;
        const clamped = Math.max(-60, Math.min(0, raw));
        smoothRef.current = smoothRef.current * 0.85 + clamped * 0.15;
        const now = Date.now();
        if (clamped > peakRef.current) {
          peakRef.current = clamped;
          peakTimeRef.current = now;
        } else if (now - peakTimeRef.current > 2000) {
          peakRef.current = Math.max(clamped, peakRef.current - 0.05);
        }
        setDb(smoothRef.current);
        setPeak(peakRef.current);
        rafRef.current = requestAnimationFrame(loop);
      };
      rafRef.current = requestAnimationFrame(loop);
      setError(null);
    } catch (e) {
      setError(e.name === "NotAllowedError" ? "Microphone access denied" : "Could not access microphone");
    }
  }, []);

  useEffect(() => { start(); return () => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    if (ctxRef.current) ctxRef.current.close();
  }; }, []);

  if (error) return React.createElement("div", { style: { padding: 24, textAlign: "center" } },
    React.createElement("div", { style: { fontSize: 16, color: S.text, marginBottom: 16, fontFamily: S.sans } }, error),
    React.createElement("div", { onClick: start, style: { display: "inline-block", padding: "10px 20px", background: S.accent, color: "#fff", borderRadius: 8, cursor: "pointer", fontFamily: S.sans, fontSize: 14, fontWeight: 600 } }, "Allow Microphone")
  );

  const pct = ((db + 60) / 60) * 100;
  const peakPct = ((peak + 60) / 60) * 100;
  const barColor = db > -6 ? "#ef4444" : db > -20 ? "#f59e0b" : S.success;
  const peakColor = peak > -6 ? "#ef4444" : peak > -20 ? "#f59e0b" : S.success;

  return React.createElement("div", { style: { padding: "16px 16px 24px" } },
    React.createElement("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 8, fontFamily: S.mono, fontSize: 13 } },
      React.createElement("span", { style: { color: S.textMuted } }, "dBFS"),
      React.createElement("span", { style: { color: peakColor } }, `Peak: ${peak.toFixed(1)} dB`)
    ),
    React.createElement("div", { style: { position: "relative", height: 32, background: S.cardBorder, borderRadius: 6, overflow: "hidden" } },
      React.createElement("div", { style: {
        position: "absolute", left: 0, top: 0, bottom: 0, borderRadius: 6,
        width: `${Math.max(0, pct)}%`, background: barColor, transition: "width 0.08s linear, background 0.15s"
      }}),
      React.createElement("div", { style: {
        position: "absolute", top: 0, bottom: 0, width: 3, borderRadius: 1,
        left: `calc(${Math.max(0, peakPct)}% - 1.5px)`, background: peakColor, opacity: 0.9
      }})
    ),
    React.createElement("div", { style: { display: "flex", justifyContent: "space-between", marginTop: 4, fontFamily: S.mono, fontSize: 10, color: S.textMuted } },
      React.createElement("span", null, "-60"),
      React.createElement("span", null, "-40"),
      React.createElement("span", null, "-20"),
      React.createElement("span", null, "0")
    ),
    React.createElement("div", { style: { textAlign: "center", marginTop: 16 } },
      React.createElement("span", { style: { fontSize: 48, fontWeight: 700, fontFamily: S.mono, color: barColor, transition: "color 0.15s" } }, db.toFixed(1)),
      React.createElement("span", { style: { fontSize: 20, fontFamily: S.mono, color: S.textMuted, marginLeft: 4 } }, "dB")
    )
  );
}

      </div>

      {/* Crew status — compact list */}
      {(() => {

              return (
                <div key={name} onClick={() => onNavigate("checklist:" + name)} style={{
                  display: "flex", alignItems: "center", gap: 10, padding: "8px 12px",

function ChecklistView({ currentUser, checks, setChecks, assignments, setAssignments, completions, setCompletions, taskNotes, setTaskNotes, photos, setPhotos, elapsed, running, setRunning, teamMembers, initialFilter, noAutoExpand, checklistData, setChecklistData }) {
  const [manualCollapse, setManualCollapse] = useState({});
  const [filterUser, setFilterUser] = useState(initialFilter || "all");
  const [searchText, setSearchText] = useState("");
  const [editMode, setEditMode] = useState(false);
  const [searchOpen, setSearchOpen] = useState(false);
  const searchInputRef = useRef(null);
  const [addingTaskInSection, setAddingTaskInSection] = useState(null);
  const [newTaskText, setNewTaskText] = useState("");
  const [editingTaskId, setEditingTaskId] = useState(null);
  const [editingTaskText, setEditingTaskText] = useState("");

  const data = checklistData || CHECKLIST_DATA;

  // Update filter if navigated from dashboard crew click
  useEffect(() => { if (initialFilter) setFilterUser(initialFilter); }, [initialFilter]);
  
  // Reset manual collapse when filter/search/edit changes so auto-expand recalculates
  useEffect(() => { setManualCollapse({}); }, [filterUser, searchText, editMode]);

  const toggleCheck = (itemId) => {
    const nc = { ...checks, [itemId]: !checks[itemId] };
    const ncomp = { ...completions };
    if (nc[itemId]) { ncomp[itemId] = { name: currentUser || "Someone" }; }
    else { delete ncomp[itemId]; }
    setChecks(nc); setCompletions(ncomp);
    if (!running && Object.values(nc).filter(Boolean).length >= 2) setRunning(true);
  };

  const addTaskToSection = (sectionId) => {
    if (!newTaskText.trim()) { setAddingTaskInSection(null); setNewTaskText(""); return; }
    const newId = "task-" + Date.now();
    const updated = JSON.parse(JSON.stringify(data));
    const sec = updated.find(s => s.id === sectionId);
    if (sec) sec.items.push({ id: newId, task: newTaskText.trim() });
    setChecklistData(updated);
    setNewTaskText("");
    setAddingTaskInSection(null);
  };

  const removeTask = (sectionId, taskId) => {
    if (!window.confirm("Delete this task? This cannot be undone.")) return;
    const updated = JSON.parse(JSON.stringify(data));
    const sec = updated.find(s => s.id === sectionId);
    if (sec) sec.items = sec.items.filter(i => i.id !== taskId);
    setChecklistData(updated);
    // Clean up orphaned entries in all supporting keys for this task ID
    if (checks[taskId] !== undefined) { const nc = { ...checks }; delete nc[taskId]; setChecks(nc); }
    if (assignments[taskId] !== undefined) { const na = { ...assignments }; delete na[taskId]; setAssignments(na); }
    if (taskNotes[taskId] !== undefined) { const nn = { ...taskNotes }; delete nn[taskId]; setTaskNotes(nn); }
    if (completions[taskId] !== undefined) { const nk = { ...completions }; delete nk[taskId]; setCompletions(nk); }
  };

  const saveTaskEdit = (sectionId, taskId) => {
    if (!editingTaskText.trim()) { setEditingTaskId(null); return; }
    const updated = JSON.parse(JSON.stringify(data));
    const sec = updated.find(s => s.id === sectionId);
    if (sec) { const t = sec.items.find(i => i.id === taskId); if (t) t.task = editingTaskText.trim(); }
    setChecklistData(updated);
    setEditingTaskId(null);
    setEditingTaskText("");
  };

  const totalItems = data.filter(sec => sec.id !== "post-event").reduce((s, sec) => s + sec.items.length, 0);
  const allDataItems = data.filter(s => s.id !== "post-event").flatMap(s => s.items);
  const totalChecked = allDataItems.filter(i => checks[i.id]).length;
  const pct = Math.round((totalChecked / totalItems) * 100);

  const searchLower = searchText.trim().toLowerCase();

  return (
    <div style={{ padding: "0 16px 100px" }}>
      <div style={{ padding: "14px 0 14px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ flex: 1, height: 8, background: S.progressTrack, borderRadius: 4, overflow: "hidden" }}>
            <div style={{ width: `${pct}%`, height: "100%", borderRadius: 4, transition: "width 0.5s ease", background: pct === 100 ? S.success : S.gradient }} />
          </div>
          <span style={{ fontFamily: S.mono, fontSize: 14, fontWeight: 700, color: pct === 100 ? S.success : S.accentText, minWidth: 44, textAlign: "right" }}>{pct}%</span>
        </div>
      </div>

      {/* Search + edit mode toolbar */}
      <div style={{ display: "flex", gap: 8, marginBottom: 10, alignItems: "center" }}>
        {searchOpen ? (
          <div style={{ flex: 1, position: "relative" }}>
            <input
              ref={searchInputRef}
              type="text"
              value={searchText}
              onChange={e => setSearchText(e.target.value)}
              onBlur={() => { if (!searchText) setSearchOpen(false); }}
              placeholder="Search tasks..."
              style={{
                width: "100%", padding: "8px 32px 8px 12px", borderRadius: 8, fontSize: 14,
                background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`,
                color: S.text, fontFamily: S.sans, outline: "none", boxSizing: "border-box"
              }}
            />
            {searchText && (
              <button onClick={() => { setSearchText(""); searchInputRef.current && searchInputRef.current.focus(); }} style={{
                position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)",
                background: "rgba(255,220,180,0.1)", border: "none", borderRadius: 10,
                width: 20, height: 20, display: "flex", alignItems: "center", justifyContent: "center",
                color: S.textMuted, fontSize: 12, cursor: "pointer", padding: 0
              }}>✕</button>
            )}
          </div>
        ) : (
          <div style={{ flex: 1 }}>
            <button onClick={() => { setSearchOpen(true); setTimeout(() => searchInputRef.current && searchInputRef.current.focus(), 0); }} style={{
              padding: "8px 12px", borderRadius: 8, fontSize: 15, cursor: "pointer", fontFamily: S.sans,
              background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`, color: S.textMuted
            }}>🔍</button>
          </div>
        )}
        {setChecklistData && currentUser === "Sam" && (
          <button onClick={() => { setEditMode(!editMode); setAddingTaskInSection(null); setEditingTaskId(null); }} style={{
            padding: "8px 12px", borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: S.sans,
            background: editMode ? S.accentGlow : "rgba(255,235,210,0.04)",
            border: `1px solid ${editMode ? S.accentBorder : S.cardBorder}`,
            color: editMode ? S.accentText : S.textMuted, whiteSpace: "nowrap"
          }}>{editMode ? "✓ Done" : "✏️"}</button>
        )}
      </div>

      {filterUser !== "all" && (
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, padding: "6px 12px", background: S.mine, border: `1px solid ${S.mineBorder}`, borderRadius: 8 }}>
          <span style={{ fontSize: 14, color: S.accentText, fontWeight: 600 }}>Showing: {filterUser}</span>
          <button onClick={() => setFilterUser("all")} style={{ marginLeft: "auto", background: "none", border: `1px solid ${S.cardBorder}`, borderRadius: 6, color: S.textMuted, fontSize: 13, padding: "4px 10px", cursor: "pointer", fontFamily: S.sans }}>Show All</button>
        </div>
      )}

      {data.map((section, secIdx) => {
        const filteredItems = filterUser === "all" ? section.items : section.items.filter(i => assignments[i.id] === filterUser || !assignments[i.id]);
        const searchedItems = searchLower ? filteredItems.filter(i => (i.task || i.text || "").toLowerCase().includes(searchLower)) : filteredItems;
        if (searchedItems.length === 0 && !editMode) return null;
        const sectionChecked = section.items.filter(i => checks[i.id]).length;
        const allDone = sectionChecked === section.items.length;
        const hasActive = sectionChecked > 0 && !allDone;
        const hasMyTasks = section.items.some(i => assignments[i.id] === currentUser && !checks[i.id]);
        const hasFilteredTasks = filterUser !== "all" && section.items.some(i => assignments[i.id] === filterUser);
        const unassignedCount = section.items.filter(i => !assignments[i.id] && !checks[i.id]).length;

        const hasSearchMatch = searchLower && searchedItems.length > 0;
        const isExpanded = manualCollapse[section.id] !== undefined
          ? !manualCollapse[section.id]
          : noAutoExpand
            ? (hasSearchMatch)
            : (hasMyTasks || hasActive || hasFilteredTasks || hasSearchMatch);

        const allIncompleteUnassigned = !allDone && unassignedCount > 0 && unassignedCount === section.items.filter(i => !checks[i.id]).length;

        return (
          <div key={section.id} style={{ marginBottom: isExpanded ? 10 : 0 }}>
            <div onClick={() => setManualCollapse(p => ({ ...p, [section.id]: isExpanded }))} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 0", cursor: "pointer", userSelect: "none", borderBottom: !isExpanded ? "1px solid rgba(255,220,180,0.08)" : "none" }}>

              <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                <span style={{ fontSize: 16, fontWeight: 600, color: allDone ? S.success : allIncompleteUnassigned ? S.textMuted : S.text, fontStyle: allIncompleteUnassigned ? "italic" : "normal" }}>{secIdx + 1}. {section.title}</span>
                {hasMyTasks && <span style={{ fontSize: 10, background: S.accentGlow, border: `1px solid ${S.accentBorder}`, color: S.accentText, padding: "2px 7px", borderRadius: 8, fontWeight: 700, fontFamily: S.mono }}>YOU</span>}

              </div>
              <span style={{ fontSize: 14, fontFamily: S.mono, color: allDone ? S.success : S.textMuted, marginRight: 2 }}>{allDone ? "✓" : `${sectionChecked}/${section.items.length}`}</span>

            {isExpanded && (
              <div style={{ marginBottom: 4 }}>
                <ProgressBar completed={sectionChecked} total={section.items.length} />
                <div style={{ display: "flex", flexDirection: "column", gap: 4, marginTop: 6 }}>
                  {(searchLower ? searchedItems : filteredItems).map((item, idx) => (
                    <div key={item.id} style={{ display: "flex", alignItems: "flex-start", gap: 6 }}>
                      {editMode && (
                        <button onClick={() => removeTask(section.id, item.id)} style={{
                          marginTop: 14, padding: "4px 7px", borderRadius: 6, fontSize: 13, cursor: "pointer",
                          background: "rgba(232,93,93,0.1)", border: "1px solid rgba(232,93,93,0.25)",
                          color: "#E88A8A", fontFamily: S.sans, flexShrink: 0
                        }}>✕</button>
                      )}
                      <div style={{ flex: 1 }}>
                        {editMode && editingTaskId === item.id ? (
                          <div style={{ display: "flex", gap: 6, padding: "10px 0" }}>
                            <input
                              autoFocus
                              value={editingTaskText}
                              onChange={e => setEditingTaskText(e.target.value)}
                              onBlur={() => saveTaskEdit(section.id, item.id)}
                              onKeyDown={e => { if (e.key === "Enter") saveTaskEdit(section.id, item.id); if (e.key === "Escape") { setEditingTaskId(null); } }}
                              style={{
                                flex: 1, padding: "8px 10px", borderRadius: 8, fontSize: 14,
                                background: "rgba(255,235,210,0.06)", border: `1px solid ${S.accentBorder}`,
                                color: S.text, fontFamily: S.sans, outline: "none"
                              }}
                            />
                          </div>

                          <div onClick={editMode ? () => { setEditingTaskId(item.id); setEditingTaskText(item.task || item.text || ""); } : undefined}

                              onToggle={() => !editMode && toggleCheck(item.id)} assignee={assignments[item.id]}
                              onAssign={u => setAssignments({ ...assignments, [item.id]: u })}
                              taskNote={taskNotes[item.id]} onUpdateNote={n => setTaskNotes({ ...taskNotes, [item.id]: n })}
                              photos={photos} setPhotos={setPhotos}

                              teamMembers={teamMembers} isLast={idx === filteredItems.length - 1} allChecks={checks} />
                          </div>

                {editMode && !searchLower && (
                  addingTaskInSection === section.id ? (
                    <div style={{ display: "flex", gap: 6, marginTop: 6 }}>

                        autoFocus
                        value={newTaskText}
                        onChange={e => setNewTaskText(e.target.value)}

                        placeholder="Task description..."
                        style={{
                          flex: 1, padding: "9px 12px", borderRadius: 8, fontSize: 14,
                          background: "rgba(255,235,210,0.06)", border: `1px solid ${S.accentBorder}`,
                          color: S.text, fontFamily: S.sans, outline: "none"

                      />
                      <button onClick={() => addTaskToSection(section.id)} style={{
                        padding: "9px 14px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer",
                        background: S.accentGlow, border: `1px solid ${S.accentBorder}`, color: S.accentText, fontFamily: S.sans

                      <button onClick={() => { setAddingTaskInSection(null); setNewTaskText(""); }} style={{

                    <button onClick={e => { e.stopPropagation(); setAddingTaskInSection(section.id); setNewTaskText(""); }} style={{
                      width: "100%", padding: "10px", borderRadius: 8, fontSize: 13, cursor: "pointer",
                      background: "rgba(255,235,210,0.02)", border: `1px dashed ${S.cardBorder}`,
                      color: S.textMuted, fontFamily: S.sans, marginTop: 6
                    }}>+ Add Task</button>
                  )
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function MyTasksView({ currentUser, checks, setChecks, assignments, setAssignments, completions, setCompletions, taskNotes, setTaskNotes, photos, setPhotos, teamMembers, elapsed, running, setRunning, remaining, targetSeconds, targetUser, checklistData, onNavigate }) {
  const isUnassigned = targetUser === "__unassigned__";
  const viewUser = isUnassigned ? null : (targetUser || currentUser);
  const isOwnView = !targetUser;
  const data = checklistData || CHECKLIST_DATA;
  const toggleCheck = (itemId) => {
    const nc = { ...checks, [itemId]: !checks[itemId] };
    const ncomp = { ...completions };
    if (nc[itemId]) { ncomp[itemId] = { name: currentUser }; }
    else { delete ncomp[itemId]; }
    setChecks(nc); setCompletions(ncomp);
    if (!running && Object.values(nc).filter(Boolean).length >= 2) setRunning(true);
  };
  const [manualExpand, setManualExpand] = useState({});
  const hasTasks = data.some(s => s.items.some(i => isUnassigned ? !assignments[i.id] : assignments[i.id] === viewUser));
  return (
    <div style={{ padding: "8px 16px 100px" }}>
      {data.map(section => {
        const my = section.items.filter(i => isUnassigned ? !assignments[i.id] : assignments[i.id] === viewUser);
        if (my.length === 0) return null;
        const done = my.filter(i => checks[i.id]).length;
        const allDone = done === my.length;
        const defaultExpanded = !allDone;
        const isExpanded = manualExpand[section.id] !== undefined ? manualExpand[section.id] : defaultExpanded;
        const toggleExpand = () => setManualExpand(prev => ({ ...prev, [section.id]: !isExpanded }));
        return (
          <div key={section.id} style={{ marginBottom: isExpanded ? 14 : 4 }}>
            <div onClick={toggleExpand} style={{ fontSize: 13, fontWeight: 600, color: S.textMuted, padding: "8px 0 6px", display: "flex", alignItems: "center", gap: 6, cursor: "pointer", userSelect: "none" }}>
              <span style={{ flex: 1, opacity: allDone ? 0.7 : 1, color: allDone ? S.success : S.textMuted }}>{section.icon} {data.findIndex(s => s.id === section.id) + 1}. {section.title}</span>
              <span style={{ fontFamily: S.mono, fontSize: 12, color: allDone ? S.success : S.textMuted }}>{allDone ? "✓" : `${done}/${my.length}`}</span>
              <span style={{ fontSize: 10, color: S.textDim, marginLeft: 2 }}>{isExpanded ? "▼" : "▶"}</span>
            </div>
            {isExpanded && (
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              {my.map((item, idx) => (
                <CheckItem key={item.id} item={item} checked={!!checks[item.id]}
                  onToggle={() => toggleCheck(item.id)} assignee={assignments[item.id]}
                  onAssign={u => setAssignments({ ...assignments, [item.id]: u })}
                  taskNote={taskNotes[item.id]} onUpdateNote={n => setTaskNotes({ ...taskNotes, [item.id]: n })}
                  photos={photos} setPhotos={setPhotos}
                  isMine={isOwnView || assignments[item.id] === currentUser} currentUser={currentUser}
                  teamMembers={teamMembers} isLast={idx === my.length - 1} allChecks={checks} />
              ))}
            </div>
            )}
          </div>
        );
      })}
      {!hasTasks && (
        <div style={{ textAlign: "center", padding: "48px 20px", color: S.textMuted }}>
          <div style={{ fontSize: 36, marginBottom: 12, opacity: 0.5 }}>👤</div>
          <div style={{ fontSize: 16, fontWeight: 600, color: S.textDim }}>{isUnassigned ? "All tasks are assigned" : isOwnView ? "No tasks assigned to you yet" : `No tasks assigned to ${viewUser}`}</div>
          <div style={{ fontSize: 14, marginTop: 6 }}>{isUnassigned ? "Every task has an owner." : isOwnView ? "Head to the Checklist and assign yourself some tasks." : "Assign tasks from the full Checklist view."}</div>
          {isOwnView && onNavigate && (
            <button onClick={() => onNavigate("checklist")} style={{
              marginTop: 20, padding: "11px 22px", borderRadius: 10, cursor: "pointer",
              fontFamily: S.sans, fontSize: 14, fontWeight: 700,
              background: S.accentGlow, border: `1px solid ${S.accentBorder}`, color: S.accentText
            }}>View Full Checklist</button>
          )}
        </div>
      )}
    </div>
  );
}

function IODropdown({ value, options, onChange }) {
  const [open, setOpen] = useState(false);
  const wrapperRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handler);
    document.addEventListener("touchstart", handler);
    return () => {
      document.removeEventListener("mousedown", handler);
      document.removeEventListener("touchstart", handler);
    };
  }, [open]);

  return (
    <div ref={wrapperRef} style={{ position: "relative", display: "inline-block" }}>
      <div onClick={() => setOpen(!open)} style={{
        display: "flex", alignItems: "center", gap: 4, padding: "4px 8px", borderRadius: 4, cursor: "pointer",
        background: "rgba(255,220,180,0.04)", border: `1px solid ${S.cardBorder}`,
        fontSize: 11, fontFamily: S.mono, color: S.textDim
      }}>
        <span>{value}</span>
        <span style={{ color: S.textMuted, fontSize: 9 }}>▾</span>
      </div>
      {open && (
        <div style={{
          position: "absolute", right: 0, top: "100%", marginTop: 4, zIndex: 1000,
          background: "#1C1A18", border: `1px solid ${S.cardBorder}`, borderRadius: 8,
          minWidth: 100, boxShadow: "0 8px 24px rgba(0,0,0,0.5)", overflow: "hidden"
        }}>
          {options.map(opt => (
            <div key={opt} onClick={() => { onChange(opt); setOpen(false); }} style={{
              padding: "8px 12px", fontSize: 13, cursor: "pointer", fontFamily: S.mono,
              color: opt === value ? S.accent : S.text, fontWeight: opt === value ? 600 : 400
            }}
            onMouseEnter={e => e.currentTarget.style.background = S.accentGlow}
            onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
              {opt === value ? `✓ ${opt}` : opt}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function IOListView({ ioConfig, setIoConfig, currentUser }) {
  const [tab, setTab] = useState("stageBox");
  const [draft, setDraft] = useState(null);
  const [showSaveModal, setShowSaveModal] = useState(false);
  const [stageBoxSub, setStageBoxSub] = useState("inputs");
  const [searchText, setSearchText] = useState("");
  const [searchOpen, setSearchOpen] = useState(false);
  const searchInputRef = useRef(null);

  const editing = draft !== null;
  const displayConfig = editing ? draft : ioConfig;
  
  const tabs = [{ id: "stageBox", label: "Stage Box" }, { id: "wingInputs", label: "Wing" }, { id: "danteRouting", label: "Dante" }];
  
  const updateChannel = (tabKey, index, field, value) => {
    const updated = JSON.parse(JSON.stringify(draft));
    if (tabKey === "danteRouting") {
      updated[tabKey].routes[index][field] = value;
    } else {
      updated[tabKey].channels[index][field] = value;
    }
    setDraft(updated);
  };
  
  const sortInputsByChannel = () => {
    const updated = JSON.parse(JSON.stringify(draft));
    updated.stageBox.channels.sort((a, b) => {
      const aNum = parseInt(a.ch, 10);
      const bNum = parseInt(b.ch, 10);
      const aIsNum = !isNaN(aNum);
      const bIsNum = !isNaN(bNum);
      if (aIsNum && bIsNum) return aNum - bNum;
      if (aIsNum) return -1;
      if (bIsNum) return 1;
      return String(a.ch).localeCompare(String(b.ch));
    });
    setDraft(updated);
  };

  const isDuplicateChannel = (tabKey, index) => {
    const channels = tabKey === "danteRouting" ? [] : displayConfig[tabKey].channels;
    const current = channels[index];
    if (!current) return false;
    const chVal = tabKey === "stageBox" ? current.ch : current.ch;
    return channels.some((c, i) => i !== index && String(c.ch) === String(chVal));
  };

  const handleChannelBlur = (tabKey) => {
    if (tabKey === "stageBox") sortInputsByChannel();
  };
  
  const addChannel = (tabKey) => {
    const updated = JSON.parse(JSON.stringify(draft));
    if (tabKey === "stageBox") {
      const lastCh = updated.stageBox.channels.length > 0 
        ? updated.stageBox.channels[updated.stageBox.channels.length - 1].ch 
        : 0;
      updated.stageBox.channels.push({ ch: lastCh, label: "New Channel", type: "XLR", notes: "" });
    } else if (tabKey === "wingInputs") {
      updated.wingInputs.channels.push({ ch: "Wing", label: "New Input", type: "XLR", notes: "" });
    } else if (tabKey === "outputs") {
      updated.outputs.channels.push({ ch: "Aux " + (updated.outputs.channels.length + 1), label: "New Output", destination: "", inEarSnake: "" });
    } else if (tabKey === "danteRouting") {
      updated.danteRouting.routes.push({ from: "Source", to: "Destination", channels: "", protocol: "Dante" });
    }
    setDraft(updated);
  };
  
  const removeChannel = (tabKey, index) => {
    const updated = JSON.parse(JSON.stringify(draft));
    if (tabKey === "danteRouting") {
      updated[tabKey].routes.splice(index, 1);
    } else {
      updated[tabKey].channels.splice(index, 1);
    }
    setDraft(updated);
  };
  
  const searchLower = searchText.trim().toLowerCase();

  const matchesSearch = (item, type) => {
    if (!searchLower) return false;
    if (type === "dante") {
      return [item.from, item.to, item.channels, item.protocol].some(f => (f || "").toLowerCase().includes(searchLower));
    }
    return [String(item.ch), item.label, item.notes, item.type, item.destination, item.inEarSnake].some(f => (f || "").toLowerCase().includes(searchLower));
  };

  const renderGroupHeader = (label, count) => (
    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 4px 4px", marginTop: 8 }}>
      <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", color: S.textMuted }}>{label}</div>
      <div style={{ flex: 1, height: 1, background: S.cardBorder }} />
      <div style={{ fontSize: 11, color: S.textDim }}>{count}</div>
    </div>
  );

  return (
    <div style={{ padding: "12px 16px 80px" }}>
      {/* Tab bar + Edit/Reset controls */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", gap: 4, marginBottom: 10 }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              flex: 1, padding: "8px 10px", borderRadius: 8, fontSize: 13, fontWeight: 600,
              cursor: "pointer", border: "1px solid", fontFamily: S.sans,
              background: tab === t.id ? S.accentGlow : "transparent",
              borderColor: tab === t.id ? S.accentBorder : S.cardBorder,
              color: tab === t.id ? S.accentText : S.textMuted,
            }}>{t.label}</button>
          ))}
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {searchOpen ? (
            <div style={{ flex: 1, position: "relative" }}>
              <input
                ref={searchInputRef}
                type="text"
                value={searchText}
                onChange={e => setSearchText(e.target.value)}
                onBlur={() => { if (!searchText) setSearchOpen(false); }}
                placeholder="Search I/O..."
                style={{
                  width: "100%", padding: "8px 32px 8px 12px", borderRadius: 8, fontSize: 14,
                  background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`,
                  color: S.text, fontFamily: S.sans, outline: "none", boxSizing: "border-box"
                }}
              />
              {searchText && (
                <button onClick={() => { setSearchText(""); searchInputRef.current && searchInputRef.current.focus(); }} style={{
                  position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)",
                  background: "rgba(255,220,180,0.1)", border: "none", borderRadius: 10,
                  width: 20, height: 20, display: "flex", alignItems: "center", justifyContent: "center",
                  color: S.textMuted, fontSize: 12, cursor: "pointer", padding: 0
                }}>✕</button>
              )}
            </div>
          ) : (
            <div style={{ flex: 1 }}>
              <button onClick={() => { setSearchOpen(true); setTimeout(() => searchInputRef.current && searchInputRef.current.focus(), 0); }} style={{
                padding: "8px 12px", borderRadius: 8, fontSize: 15, cursor: "pointer", fontFamily: S.sans,
                background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`, color: S.textMuted
              }}>🔍</button>
            </div>
          )}
          {(currentUser === "Sam" || currentUser === "Bri") && (
            editing ? (
              <React.Fragment>
                <button onClick={() => setShowSaveModal(true)} style={{
                  padding: "8px 12px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: S.sans,

              }}>✏️</button>

        </div>
        {!searchLower && tab === "stageBox" && (

          onClick={() => setShowSaveModal(false)}>
          <div onClick={e => e.stopPropagation()} style={{ background: "#1C1A18", border: `1px solid ${S.accentBorder}`, borderRadius: 14, padding: "20px", maxWidth: 340, width: "100%" }}>
            <div style={{ fontSize: 18, textAlign: "center", marginBottom: 8 }}>🎚️</div>

            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => { setDraft(null); setShowSaveModal(false); }} style={{ flex: 1, padding: "10px", background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`, borderRadius: 8, color: S.textMuted, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: S.sans }}>Discard</button>
              <button onClick={() => { setIoConfig(draft); setDraft(null); setShowSaveModal(false); }} style={{ flex: 1, padding: "10px", background: S.accentGlow, border: `1px solid ${S.accentBorder}`, borderRadius: 8, color: S.accentText, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: S.sans }}>Save</button>
            </div>
          </div>
        </div>
      )}
      
      {/* Cross-tab search results */}
      {searchLower && (() => {
        const sbMatches = displayConfig.stageBox.channels.filter(ch => matchesSearch(ch, "channel"));
        const wingMatches = (displayConfig.wingInputs?.channels || []).filter(ch => matchesSearch(ch, "channel"));
        const outMatches = displayConfig.outputs.channels.filter(ch => matchesSearch(ch, "channel"));
        const danteMatches = displayConfig.danteRouting.routes.filter(r => matchesSearch(r, "dante"));
        const totalMatches = sbMatches.length + wingMatches.length + outMatches.length + danteMatches.length;

        if (totalMatches === 0) {
          return <div style={{ textAlign: "center", color: S.textMuted, padding: "24px 0", fontSize: 14 }}>No matches for "{searchText.trim()}"</div>;
        }

        const renderSearchGroupHeader = (label, count) => (
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 4px 4px", marginTop: 8 }}>
            <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", color: S.textMuted }}>{label}</div>
            <div style={{ flex: 1, height: 1, background: S.cardBorder }} />
            <div style={{ fontSize: 11, color: S.textDim }}>{count}</div>
          </div>
        );

        const renderSearchChannel = (ch, section) => (
          <div key={`${section}-${ch.ch}`} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: S.card, border: `1px solid ${S.cardBorder}`, borderRadius: 8, marginBottom: 4 }}>
            <div style={{ minWidth: section === "stageBox" ? 32 : 60, fontSize: 12, color: S.accentText, background: section === "stageBox" ? "rgba(16,185,129,0.1)" : S.accentGlow, padding: "3px 8px", borderRadius: section === "stageBox" ? 6 : 4, fontFamily: S.mono, textAlign: "center", fontWeight: section === "stageBox" ? 700 : 600,
              ...(section === "stageBox" ? { color: S.success, height: 28, display: "flex", alignItems: "center", justifyContent: "center" } : {})
            }}>{ch.ch}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: S.text }}>{ch.label}</div>
              {ch.notes && <div style={{ fontSize: 12, color: S.textMuted }}>{ch.notes}</div>}
              {ch.destination && <div style={{ fontSize: 12, color: S.textMuted }}>→ {ch.destination}</div>}
              {ch.inEarSnake && (
                <div style={{
                  display: "inline-flex", alignItems: "center", gap: 4,
                  marginTop: 4, padding: "3px 10px", borderRadius: 20,
                  background: S.accentGlow, border: `1px solid ${S.accentBorder}`,
                  fontSize: 12, fontWeight: 700, color: S.accent, fontFamily: S.sans
                }}>🎧 {ch.inEarSnake}</div>
              )}
            </div>
            {ch.type && <div style={{ fontSize: 11, color: S.textDim, background: "rgba(255,235,210,0.04)", padding: "2px 8px", borderRadius: 4, fontFamily: S.mono }}>{ch.type}</div>}
          </div>
        );

        const renderSearchDante = (r) => (
          <div key={`dante-${r.from}-${r.to}`} style={{ padding: "14px", background: S.card, border: `1px solid ${S.cardBorder}`, borderRadius: 10, marginBottom: 6 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: S.text }}>{r.from}</div>
              <div style={{ color: S.accent }}>→</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: S.text }}>{r.to}</div>
            </div>
            <div style={{ display: "flex", gap: 8, fontSize: 12 }}>
              <span style={{ color: S.textMuted }}>{r.channels}</span>
              <span style={{ color: S.accent, background: S.accentGlow, padding: "1px 6px", borderRadius: 4, fontFamily: S.mono, fontSize: 11 }}>{r.protocol}</span>
            </div>
          </div>
        );

        return (
          <>
            <div style={{ fontSize: 12, color: S.textMuted, textAlign: "center", marginBottom: 4 }}>{totalMatches} result{totalMatches !== 1 ? "s" : ""}</div>
            {sbMatches.length > 0 && <>{renderSearchGroupHeader("Stage Box Inputs", sbMatches.length)}{sbMatches.map(ch => renderSearchChannel(ch, "stageBox"))}</>}
            {wingMatches.length > 0 && <>{renderSearchGroupHeader("Direct Inputs", wingMatches.length)}{wingMatches.map(ch => renderSearchChannel(ch, "wing"))}</>}
            {outMatches.length > 0 && <>{renderSearchGroupHeader("Outputs", outMatches.length)}{outMatches.map(ch => renderSearchChannel(ch, "outputs"))}</>}
            {danteMatches.length > 0 && <>{renderSearchGroupHeader("Dante Routing", danteMatches.length)}{danteMatches.map(renderSearchDante)}</>}
          </>
        );
      })()}

      {/* Stage Box — Inputs sub-view */}
      {!searchLower && tab === "stageBox" && stageBoxSub === "inputs" && (() => {
        const channels = displayConfig.stageBox.channels;
        const indexedChannels = channels.map((ch, i) => ({ ...ch, _origIndex: i }));
        const grouped = STAGE_BOX_GROUPS.map(g => ({
          ...g,
          channels: indexedChannels.filter(ch => {
            const num = parseInt(ch.ch, 10);
            return !isNaN(num) && num >= g.range[0] && num <= g.range[1];
          })
        }));
        const assignedIndices = new Set(grouped.flatMap(g => g.channels.map(c => c._origIndex)));
        const otherChannels = indexedChannels.filter(ch => !assignedIndices.has(ch._origIndex));

        const renderInput = (ch) => {
          const i = ch._origIndex;
          return (
            <div key={`sb-${i}`} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: S.card, border: `1px solid ${S.cardBorder}`, borderRadius: 8, marginBottom: 4 }}>
              <div style={{ minWidth: 32, height: 28, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", background: isDuplicateChannel("stageBox", i) ? "rgba(239,68,68,0.15)" : "rgba(16,185,129,0.1)", color: isDuplicateChannel("stageBox", i) ? "#EF4444" : S.success, fontSize: 12, fontWeight: 700, fontFamily: S.mono }}>
                {editing ? (
                  <input type="text" value={ch.ch} onChange={e => updateChannel("stageBox", i, "ch", e.target.value)}
                    onBlur={() => handleChannelBlur("stageBox")}
                    style={{ width: 32, textAlign: "center", background: "transparent", border: "none", color: isDuplicateChannel("stageBox", i) ? "#EF4444" : S.success, fontSize: 12, fontWeight: 700, fontFamily: S.mono, outline: "none" }} />
                ) : ch.ch}
              </div>
              <div style={{ flex: 1 }}>
                {editing ? (
                  <>
                    <input value={ch.label} onChange={e => updateChannel("stageBox", i, "label", e.target.value)}
                      style={{ width: "100%", background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`, borderRadius: 6, color: S.text, fontSize: 14, fontWeight: 600, padding: "4px 8px", marginBottom: 4, outline: "none", fontFamily: S.sans }} />
                    <input value={ch.notes} onChange={e => updateChannel("stageBox", i, "notes", e.target.value)} placeholder="Notes..."
                      style={{ width: "100%", background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`, borderRadius: 6, color: S.textMuted, fontSize: 12, padding: "3px 8px", outline: "none", fontFamily: S.sans }} />
                  </>
                ) : (
                  <><div style={{ fontSize: 14, fontWeight: 600, color: S.text }}>{ch.label}</div>{ch.notes && <div style={{ fontSize: 12, color: S.textMuted }}>{ch.notes}</div>}</>
                )}
              </div>
              {editing ? (
                <IODropdown value={ch.type} options={["XLR", "DI/XLR", "Line", "1/4\""]} onChange={val => updateChannel("stageBox", i, "type", val)} />
              ) : (
                <div style={{ fontSize: 11, color: S.textDim, background: "rgba(255,235,210,0.04)", padding: "2px 8px", borderRadius: 4, fontFamily: S.mono }}>{ch.type}</div>
              )}
              {editing && (
                <button onClick={() => removeChannel("stageBox", i)} style={{
                  background: "rgba(232,93,93,0.08)", border: "1px solid rgba(232,93,93,0.2)",
                  borderRadius: 6, color: "#E88A8A", fontSize: 16, padding: "2px 8px", cursor: "pointer", fontFamily: S.sans
                }}>✕</button>
              )}
            </div>
          );
        };

        return (
          <>
            {grouped.map(g => g.channels.length > 0 && (
              <React.Fragment key={g.label}>
                {renderGroupHeader(g.label, g.channels.length)}
                {g.channels.map(renderInput)}
              </React.Fragment>
            ))}
            {otherChannels.length > 0 && (
              <>
                {renderGroupHeader("Other", otherChannels.length)}
                {otherChannels.map(renderInput)}
              </>
            )}
            {editing && (
              <button onClick={() => addChannel("stageBox")} style={{
                width: "100%", padding: "10px", borderRadius: 8, fontSize: 14, fontWeight: 600,
                cursor: "pointer", fontFamily: S.sans, marginTop: 8,
                background: "rgba(255,235,210,0.04)", border: `1px dashed ${S.cardBorder}`,
                color: S.textMuted
              }}>+ Add Input</button>
            )}
            <div style={{ fontSize: 12, color: S.textMuted, textAlign: "center", marginTop: 8, marginBottom: 4 }}>{channels.length} channels</div>
          </>
        );
      })()}
      
      {/* Wing Direct Inputs */}
      {!searchLower && tab === "wingInputs" && displayConfig.wingInputs && displayConfig.wingInputs.channels.map((ch, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: S.card, border: `1px solid ${S.cardBorder}`, borderRadius: 8, marginBottom: 4 }}>
          <div style={{ minWidth: 60, fontSize: 12, color: S.accentText, background: S.accentGlow, padding: "3px 8px", borderRadius: 4, fontFamily: S.mono, textAlign: "center", fontWeight: 600 }}>
            {editing ? (
              <input value={ch.ch} onChange={e => updateChannel("wingInputs", i, "ch", e.target.value)}
                style={{ width: 60, textAlign: "center", background: "transparent", border: "none", color: S.accentText, fontSize: 12, fontWeight: 600, fontFamily: S.mono, outline: "none" }} />
            ) : ch.ch}
          </div>
          <div style={{ flex: 1 }}>
            {editing ? (
              <>
                <input value={ch.label} onChange={e => updateChannel("wingInputs", i, "label", e.target.value)}
                  style={{ width: "100%", background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`, borderRadius: 6, color: S.text, fontSize: 14, fontWeight: 600, padding: "4px 8px", marginBottom: 4, outline: "none", fontFamily: S.sans }} />
                <input value={ch.notes} onChange={e => updateChannel("wingInputs", i, "notes", e.target.value)} placeholder="Notes..."
                  style={{ width: "100%", background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`, borderRadius: 6, color: S.textMuted, fontSize: 12, padding: "3px 8px", outline: "none", fontFamily: S.sans }} />
              </>
            ) : (
              <><div style={{ fontSize: 14, fontWeight: 600, color: S.text }}>{ch.label}</div>{ch.notes && <div style={{ fontSize: 12, color: S.textMuted }}>{ch.notes}</div>}</>
            )}
          </div>
          <div style={{ fontSize: 11, color: S.textDim, background: "rgba(255,235,210,0.04)", padding: "2px 8px", borderRadius: 4, fontFamily: S.mono }}>{ch.type}</div>
          {editing && (
            <button onClick={() => removeChannel("wingInputs", i)} style={{
              background: "rgba(232,93,93,0.08)", border: "1px solid rgba(232,93,93,0.2)",
              borderRadius: 6, color: "#E88A8A", fontSize: 16, padding: "2px 8px", cursor: "pointer", fontFamily: S.sans
            }}>✕</button>
          )}
        </div>
      ))}
      
      {/* Stage Box — Outputs sub-view */}
      {!searchLower && tab === "stageBox" && stageBoxSub === "outputs" && (() => {
        const channels = displayConfig.outputs.channels;
        const indexedChannels = channels.map((ch, i) => ({ ...ch, _origIndex: i }));
        const iemChannels = indexedChannels.filter(ch => isIEM(ch.destination));
        const infraChannels = indexedChannels.filter(ch => !isIEM(ch.destination));

        const renderOutput = (ch) => {
          const i = ch._origIndex;
          return (
            <div key={`out-${i}`} style={{ padding: "12px 14px", background: S.card, border: `1px solid ${S.cardBorder}`, borderRadius: 8, marginBottom: 4 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ minWidth: 60, fontSize: 12, color: isDuplicateChannel("outputs", i) ? "#EF4444" : S.accentText, background: isDuplicateChannel("outputs", i) ? "rgba(239,68,68,0.15)" : S.accentGlow, padding: "3px 8px", borderRadius: 4, fontFamily: S.mono, textAlign: "center", fontWeight: 600 }}>
                  {editing ? (
                    <input value={ch.ch} onChange={e => updateChannel("outputs", i, "ch", e.target.value)}
                      style={{ width: 60, textAlign: "center", background: "transparent", border: "none", color: isDuplicateChannel("outputs", i) ? "#EF4444" : S.accentText, fontSize: 12, fontWeight: 600, fontFamily: S.mono, outline: "none" }} />
                  ) : ch.ch}
                </div>
                <div style={{ flex: 1 }}>
                  {editing ? (
                    <>
                      <input value={ch.label} onChange={e => updateChannel("outputs", i, "label", e.target.value)}
                        style={{ width: "100%", background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`, borderRadius: 6, color: S.text, fontSize: 14, fontWeight: 600, padding: "4px 8px", marginBottom: 4, outline: "none", fontFamily: S.sans }} />
                      <input value={ch.destination} onChange={e => updateChannel("outputs", i, "destination", e.target.value)} placeholder="Destination..."
                        style={{ width: "100%", background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`, borderRadius: 6, color: S.textMuted, fontSize: 12, padding: "3px 8px", outline: "none", fontFamily: S.sans }} />
                      <input value={ch.inEarSnake || ""} onChange={e => updateChannel("outputs", i, "inEarSnake", e.target.value)} placeholder="In-ear snake..."
                        style={{ width: "100%", background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`, borderRadius: 6, color: S.textMuted, fontSize: 12, padding: "3px 8px", outline: "none", fontFamily: S.sans }} />
                    </>
                  ) : (
                    <>
                      <div style={{ fontSize: 14, fontWeight: 600, color: S.text }}>{ch.label}</div>
                      {ch.destination && <div style={{ fontSize: 12, color: S.textMuted }}>→ {ch.destination}</div>}
                      {ch.inEarSnake && (
                        <div style={{
                          display: "inline-flex", alignItems: "center", gap: 4,
                          marginTop: 4, padding: "3px 10px", borderRadius: 20,
                          background: S.accentGlow, border: `1px solid ${S.accentBorder}`,
                          fontSize: 12, fontWeight: 700, color: S.accent, fontFamily: S.sans
                        }}>🎧 {ch.inEarSnake}</div>
                      )}
                    </>
                  )}
                </div>
                {editing && (
                  <button onClick={() => removeChannel("outputs", i)} style={{
                    background: "rgba(232,93,93,0.08)", border: "1px solid rgba(232,93,93,0.2)",
                    borderRadius: 6, color: "#E88A8A", fontSize: 16, padding: "2px 8px", cursor: "pointer", fontFamily: S.sans
                  }}>✕</button>
                )}
              </div>
            </div>
          );
        };

        return (
          <>
            {iemChannels.length > 0 && (
              <>
                {renderGroupHeader("In-Ear Monitors", iemChannels.length)}
                {iemChannels.map(renderOutput)}
              </>
            )}
            {infraChannels.length > 0 && (
              <>
                {renderGroupHeader("Infrastructure", infraChannels.length)}
                {infraChannels.map(renderOutput)}
              </>
            )}
            {editing && (
              <button onClick={() => addChannel("outputs")} style={{
                width: "100%", padding: "10px", borderRadius: 8, fontSize: 14, fontWeight: 600,
                cursor: "pointer", fontFamily: S.sans, marginTop: 8,
                background: "rgba(255,235,210,0.04)", border: `1px dashed ${S.cardBorder}`,
                color: S.textMuted
              }}>+ Add Output</button>
            )}
            <div style={{ fontSize: 12, color: S.textMuted, textAlign: "center", marginTop: 8, marginBottom: 4 }}>{channels.length} outputs</div>
          </>
        );
      })()}
      
      {/* Dante Routing */}
      {!searchLower && tab === "danteRouting" && displayConfig.danteRouting.routes.map((r, i) => (
        <div key={i} style={{ padding: "14px", background: S.card, border: `1px solid ${S.cardBorder}`, borderRadius: 10, marginBottom: 6 }}>
          {editing ? (
            <>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                <input value={r.from} onChange={e => updateChannel("danteRouting", i, "from", e.target.value)} placeholder="Source"
                  style={{ flex: 1, minWidth: 0, background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`, borderRadius: 6, color: S.text, fontSize: 14, fontWeight: 600, padding: "4px 8px", outline: "none", fontFamily: S.sans }} />
                <div style={{ color: S.accent }}>→</div>
                <input value={r.to} onChange={e => updateChannel("danteRouting", i, "to", e.target.value)} placeholder="Destination"
                  style={{ flex: 1, minWidth: 0, background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`, borderRadius: 6, color: S.text, fontSize: 14, fontWeight: 600, padding: "4px 8px", outline: "none", fontFamily: S.sans }} />
                <button onClick={() => removeChannel("danteRouting", i)} style={{
                  background: "rgba(232,93,93,0.08)", border: "1px solid rgba(232,93,93,0.2)",
                  borderRadius: 6, color: "#E88A8A", fontSize: 16, padding: "2px 8px", cursor: "pointer", fontFamily: S.sans, flexShrink: 0
                }}>✕</button>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <input value={r.channels} onChange={e => updateChannel("danteRouting", i, "channels", e.target.value)} placeholder="Channels description"
                  style={{ flex: 1, background: "rgba(255,235,210,0.04)", border: `1px solid ${S.cardBorder}`, borderRadius: 6, color: S.textMuted, fontSize: 12, padding: "3px 8px", outline: "none", fontFamily: S.sans }} />
                <IODropdown value={r.protocol} options={["Dante", "Analog", "AES50", "USB"]} onChange={val => updateChannel("danteRouting", i, "protocol", val)} />
              </div>
            </>
          ) : (
            <>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: S.text }}>{r.from}</div>
                <div style={{ color: S.accent }}>→</div>
                <div style={{ fontSize: 14, fontWeight: 600, color: S.text }}>{r.to}</div>
              </div>
              <div style={{ display: "flex", gap: 8, fontSize: 12 }}>
                <span style={{ color: S.textMuted }}>{r.channels}</span>
                <span style={{ color: S.accent, background: S.accentGlow, padding: "1px 6px", borderRadius: 4, fontFamily: S.mono, fontSize: 11 }}>{r.protocol}</span>
              </div>
            </>
          )}
        </div>
      ))}
      
      {!searchLower && editing && tab === "danteRouting" && (
        <button onClick={() => addChannel("danteRouting")} style={{
          width: "100%", padding: "10px", borderRadius: 8, fontSize: 14, fontWeight: 600,
          cursor: "pointer", fontFamily: S.sans, marginTop: 8,
          background: "rgba(255,235,210,0.04)", border: `1px dashed ${S.cardBorder}`,
          color: S.textMuted
        }}>+ Add Route</button>
      )}
    </div>
  );
}

function SignalFlowView() {
  const Box = ({x, y, w, h, label, sub, stroke}) => (
    <>
      <rect x={x} y={y} width={w} height={h || 50} rx="8" fill="rgba(255,235,210,0.05)" stroke={stroke || "rgba(255,200,140,0.12)"} strokeWidth="1.5"/>
      <text x={x + w/2} y={y + (sub ? 20 : (h||50)/2 + 5)} fill="#F0E6D8" fontSize="14" fontWeight="600" textAnchor="middle" fontFamily="'DM Sans', system-ui">{label}</text>

    <>
      <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#7A6E60" strokeWidth="1.5"/>

  const VLine = ({x,y1,y2}) => <line x1={x} y1={y1} x2={x} y2={y2} stroke="#7A6E60" strokeWidth="1.5"/>;

  return (
    <div style={{ padding: "12px 16px 80px" }}>
      {/* Audio Signal Chain */}
      <div style={{ marginBottom: 16, background: "rgba(232,137,58,0.04)", borderRadius: 16, padding: "20px 8px" }}>

        <svg width="100%" viewBox="0 0 570 660" style={{ display: "block" }}>
          <Box x={170} y={10} w={200} h={50} label="Stage Inputs" sub="(Mics, DIs, Keys, Drums)"/>
          <Arrow x1={270} y1={60} x2={270} y2={90}/>
          <Label x={280} y={80} text="XLR / DI"/>

          <Box x={170} y={90} w={200} h={50} label="Midas DL251" sub="(Stage Box)"/>
          <Arrow x1={270} y1={140} x2={270} y2={170}/>
          <Label x={280} y={160} text="AES50 (CAT6)"/>

          <Box x={170} y={170} w={200} h={50} label="Behringer Wing" sub="(Soundboard)"/>

          {/* WiFi Router — right sidebar off Wing */}
          <line x1={370} y1={195} x2={400} y2={195} stroke="#7A6E60" strokeWidth="1"/>
          <rect x={400} y={180} width={85} height={30} rx="6" fill="rgba(255,235,210,0.04)" stroke="rgba(255,200,140,0.08)" strokeWidth="1"/>
          <text x={442} y={200} fill="#B8A894" fontSize="11" fontWeight="500" textAnchor="middle">WiFi Router</text>
          <text x={442} y={222} fill="#7A6E60" fontSize="9" textAnchor="middle">iPad (WiFi)</text>

// ERROR BOUNDARY
// ═══════════════════════════════════════════
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error('ELIM app render error:', error, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {
        style: {
          minHeight: '100vh', background: '#111010', display: 'flex', alignItems: 'center',
          justifyContent: 'center', fontFamily: "'DM Sans', system-ui, sans-serif",
          color: '#F0E6D8', padding: 24, textAlign: 'center'
        }
      },
        React.createElement('div', { style: { maxWidth: 320 } },
          React.createElement('div', { style: { fontSize: 40, marginBottom: 16 } }, '⚠️'),
          React.createElement('div', { style: { fontSize: 18, fontWeight: 700, marginBottom: 8 } }, 'Something went wrong'),
          React.createElement('div', { style: { fontSize: 14, color: '#B8A894', marginBottom: 24, lineHeight: 1.5 } },
            'The app hit an unexpected error. Your data is safe. Tap below to reload.'
          ),
          React.createElement('button', {
            onClick: () => window.location.reload(),
            style: {
              padding: '12px 28px', borderRadius: 10, fontSize: 15, fontWeight: 700,
              background: 'rgba(232,137,58,0.15)', border: '1px solid rgba(232,137,58,0.3)',
              color: '#E8893A', cursor: 'pointer', fontFamily: "'DM Sans', system-ui, sans-serif"
            }
          }, 'Tap to Reload')
        )
      );
    }
    return this.props.children;
  }
}
